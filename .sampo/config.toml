# Sampo configuration
version = 1

[git]
default_branch = "main"
short_tags = "posthog-kmp"    # Tag with v1.2.3 rather than posthog-kmp-v1.2.3

[github]
repository = "posthog/posthog-kmp"

[changelog]
# Options for release notes generation.
# show_commit_hash = true (default)
# show_acknowledgments = true (default)

[packages]
# The root package.json is a private version carrier only (never published to
# npm). Sampo owns its version; scripts/bump-version.sh syncs that version into
# version.properties, which the Gradle build reads. Publishing itself is done by
# Gradle to Maven Central, not by `sampo publish`.
