version: 2
updates:
  # Release tooling (@changesets/*)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # Pinned action SHAs in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5

  # Gradle dependencies (gradle/libs.versions.toml)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

# kotlin-js-store/yarn.lock is not covered: it is generated by the Kotlin
# Gradle plugin (no package.json manifest), so dependabot cannot update it.
