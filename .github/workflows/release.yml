name: "Release"

on:
  push:
    branches: [main]
    paths:
      - '.changeset/*.md'
  workflow_dispatch:

permissions:
  contents: read

# Concurrency control: only one release process can run at a time
# This prevents race conditions if multiple releasable changesets merge simultaneously
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-changesets:
    name: Check for changesets
    runs-on: ubuntu-latest
    outputs:
      has-changesets: ${{ steps.check.outputs.has-changesets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check for changesets
        id: check
        run: |
          changeset_count=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$changeset_count" -gt 0 ]; then
            echo "has-changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found $changeset_count changeset(s), ready to release"
          else
            echo "has-changesets=false" >> "$GITHUB_OUTPUT"
            echo "No changesets to release"
          fi

  prepare-release-candidate:
    name: Prepare release candidate
    needs: check-changesets
    runs-on: ubuntu-latest
    if: needs.check-changesets.outputs.has-changesets == 'true'
    permissions:
      contents: read
    outputs:
      new-version: ${{ steps.candidate.outputs.new-version }}
      patch-sha256: ${{ steps.candidate.outputs.patch-sha256 }}
      source-sha: ${{ steps.candidate.outputs.source-sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm and Node.js
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0
        with:
          # pnpm/setup installs runtimes via pnpm runtime, which requires pnpm >=11.1.0.
          version: 11.7.0
          runtime: node@24
          cache: true
          install: false

      - name: Install release tooling dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Apply changesets and update version
        id: candidate
        env:
          # changelog-github resolves each changeset's PR and author via the API
          GITHUB_TOKEN: ${{ github.token }}
          # If scripts/bump-version.sh changes, recompute this with:
          # sha256sum scripts/bump-version.sh
          # Then update EXPECTED_BUMP_SCRIPT_SHA256 in this workflow in the same PR.
          EXPECTED_BUMP_SCRIPT_SHA256: 8f6efec41e552a9aeb9ba4016b482a25ffac4b7eca08f68f385b50621352260b
        run: |
          set -euo pipefail

          source_sha=$(git rev-parse HEAD)
          pnpm exec changeset version
          new_version=$(node -p "require('./package.json').version")

          actual_bump_script_sha256=$(sha256sum scripts/bump-version.sh | awk '{print $1}')
          if [ "$actual_bump_script_sha256" != "$EXPECTED_BUMP_SCRIPT_SHA256" ]; then
            echo "scripts/bump-version.sh sha256 mismatch: expected $EXPECTED_BUMP_SCRIPT_SHA256, got $actual_bump_script_sha256" >&2
            exit 1
          fi

          ./scripts/bump-version.sh "$new_version"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No release candidate changes were generated" >&2
            exit 1
          fi

          changed_files=$(git diff --name-only)
          while IFS= read -r file; do
            case "$file" in
              CHANGELOG.md|package.json|version.properties|.changeset/*.md) ;;
              *)
                echo "Unexpected release candidate change: $file" >&2
                exit 1
                ;;
            esac
          done <<< "$changed_files"

          properties_version="$(sed -n 's/^VERSION_MAJOR=//p' version.properties).$(sed -n 's/^VERSION_MINOR=//p' version.properties).$(sed -n 's/^VERSION_PATCH=//p' version.properties)"
          if [ "$new_version" != "$properties_version" ]; then
            echo "Version mismatch: package.json=$new_version version.properties=$properties_version" >&2
            exit 1
          fi

          git diff --binary > release.patch
          patch_sha256=$(sha256sum release.patch | awk '{print $1}')

          {
            echo "source-sha=$source_sha"
            echo "new-version=$new_version"
            echo "patch-sha256=$patch_sha256"
          } >> "$GITHUB_OUTPUT"
          echo "Release candidate $new_version prepared from $source_sha with patch sha256 $patch_sha256"

      - name: Upload release candidate patch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate-${{ steps.candidate.outputs.source-sha }}
          path: release.patch
          if-no-files-found: error
          retention-days: 5
          # Allow "Re-run all jobs" on a failed run to upload again
          overwrite: true

  verify-release-candidate:
    name: Verify release candidate
    needs: [check-changesets, prepare-release-candidate]
    runs-on: ubuntu-latest
    if: needs.check-changesets.outputs.has-changesets == 'true'
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare-release-candidate.outputs.source-sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download release candidate patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate-${{ needs.prepare-release-candidate.outputs.source-sha }}
          path: release-candidate

      - name: Apply and validate release candidate patch
        env:
          EXPECTED_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
        run: |
          set -euo pipefail

          git apply --index release-candidate/release.patch

          package_version=$(perl -0ne 'print $1 if /"version"\s*:\s*"([^"]+)"/' package.json)
          properties_version="$(sed -n 's/^VERSION_MAJOR=//p' version.properties).$(sed -n 's/^VERSION_MINOR=//p' version.properties).$(sed -n 's/^VERSION_PATCH=//p' version.properties)"
          if [ "$EXPECTED_VERSION" != "$package_version" ] || [ "$EXPECTED_VERSION" != "$properties_version" ]; then
            echo "Version mismatch: expected=$EXPECTED_VERSION package.json=$package_version version.properties=$properties_version" >&2
            exit 1
          fi

      - name: Check tag and release do not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          check_missing() {
            local description="$1"
            shift
            local output
            local status

            if output=$("$@" 2>&1); then
              echo "$description already exists for $EXPECTED_VERSION" >&2
              exit 1
            else
              status=$?
            fi

            if grep -q "HTTP 404" <<< "$output" || grep -q "Not Found" <<< "$output"; then
              return 0
            fi

            echo "Could not check whether $description exists: $output" >&2
            exit "$status"
          }

          check_missing "GitHub release" gh api "repos/$REPOSITORY/releases/tags/$EXPECTED_VERSION"
          check_missing "git tag" gh api "repos/$REPOSITORY/git/ref/tags/$EXPECTED_VERSION"

  notify-approval-needed:
    name: Notify Slack - Approval Needed
    needs: [check-changesets, prepare-release-candidate, verify-release-candidate]
    if: needs.check-changesets.outputs.has-changesets == 'true' && needs.prepare-release-candidate.result == 'success' && needs.verify-release-candidate.result == 'success'
    uses: PostHog/.github/.github/workflows/notify-approval-needed.yml@5fc4680761e8ac29a61b212756230eba0e276d8c
    with:
      slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
      slack_user_group_id: ${{ vars.GROUP_CLIENT_LIBRARIES_SLACK_GROUP_ID }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
      posthog_project_api_key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}

  release:
    name: Release and publish
    needs: [check-changesets, prepare-release-candidate, verify-release-candidate, notify-approval-needed]
    # macos-latest is required: publishing builds the iOS Kotlin/Native klibs,
    # which only compile on the Apple toolchain.
    runs-on: macos-latest
    # Use `always()` so the job still runs if the Slack notification fails, while
    # keeping the dependency so we can reference notify-approval-needed outputs.
    if: always() && needs.check-changesets.outputs.has-changesets == 'true' && needs.verify-release-candidate.result == 'success'
    environment: "Release" # Requires approval from a maintainer, notified in Slack above
    permissions:
      actions: read
      contents: read
    steps:
      - name: Notify Slack - Approved
        continue-on-error: true
        if: needs.notify-approval-needed.outputs.slack_ts != ''
        uses: PostHog/.github/.github/actions/slack-thread-reply@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "✅ Release approved! Version bump in progress..."
          emoji_reaction: "white_check_mark"

      - name: Checkout approved source revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare-release-candidate.outputs.source-sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download verified release candidate patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate-${{ needs.prepare-release-candidate.outputs.source-sha }}
          path: release-candidate

      - name: Apply verified release candidate patch
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PATCH_SHA256: ${{ needs.prepare-release-candidate.outputs.patch-sha256 }}
          EXPECTED_SOURCE_SHA: ${{ needs.prepare-release-candidate.outputs.source-sha }}
          EXPECTED_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
        run: |
          set -euo pipefail

          current_main_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')
          if [ "$current_main_sha" != "$EXPECTED_SOURCE_SHA" ]; then
            echo "main moved since the release candidate was prepared: expected $EXPECTED_SOURCE_SHA, got $current_main_sha" >&2
            exit 1
          fi

          actual_patch_sha256=$(shasum -a 256 release-candidate/release.patch | awk '{print $1}')
          if [ "$actual_patch_sha256" != "$EXPECTED_PATCH_SHA256" ]; then
            echo "Release candidate patch sha256 mismatch: expected $EXPECTED_PATCH_SHA256, got $actual_patch_sha256" >&2
            exit 1
          fi

          git apply --index release-candidate/release.patch

          package_version=$(perl -0ne 'print $1 if /"version"\s*:\s*"([^"]+)"/' package.json)
          properties_version="$(sed -n 's/^VERSION_MAJOR=//p' version.properties).$(sed -n 's/^VERSION_MINOR=//p' version.properties).$(sed -n 's/^VERSION_PATCH=//p' version.properties)"
          if [ "$EXPECTED_VERSION" != "$package_version" ] || [ "$EXPECTED_VERSION" != "$properties_version" ]; then
            echo "Version mismatch: expected=$EXPECTED_VERSION package.json=$package_version version.properties=$properties_version" >&2
            exit 1
          fi

          rm -rf release-candidate

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v4.4.4

      - name: Cache Kotlin Native
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4.2.4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      # Installation tokens live 60 minutes; everything from here on (commit,
      # publish, tag, release) must fit inside that window.
      - name: Get GitHub App token
        id: releaser
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_POSTHOG_KMP_RELEASER_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_KMP_RELEASER_PRIVATE_KEY }}

      # Commit via the GraphQL createCommitOnBranch API so the commit is signed
      # by GitHub (satisfies the signed-commits ruleset). ghcommit-action wraps
      # the same API but is a container action, which macOS runners can't run.
      - name: Commit version bump
        id: commit-version-bump
        env:
          GH_TOKEN: ${{ steps.releaser.outputs.token }}
          COMMIT_MESSAGE: "chore: release ${{ needs.prepare-release-candidate.outputs.new-version }} [version bump] [skip ci]"
        run: |
          set -euo pipefail
          additions='[]'
          deletions='[]'
          while IFS= read -r line; do
            status="${line:0:2}"
            path="${line:3}"
            if [[ "$status" == *D* ]]; then
              deletions=$(jq -c --arg p "$path" '. + [{path: $p}]' <<<"$deletions")
            else
              contents=$(base64 < "$path" | tr -d '\n')
              additions=$(jq -c --arg p "$path" --arg c "$contents" '. + [{path: $p, contents: $c}]' <<<"$additions")
            fi
          done < <(git status --porcelain)
          input=$(jq -nc \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg oid "$(git rev-parse HEAD)" \
            --arg msg "$COMMIT_MESSAGE" \
            --argjson additions "$additions" \
            --argjson deletions "$deletions" \
            '{branch: {repositoryNameWithOwner: $repo, branchName: "main"},
              message: {headline: $msg},
              expectedHeadOid: $oid,
              fileChanges: {additions: $additions, deletions: $deletions}}')
          body=$(jq -nc --argjson input "$input" \
            '{query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }",
              variables: {input: $input}}')
          response=$(curl -sSf -H "Authorization: bearer $GH_TOKEN" -d "$body" https://api.github.com/graphql)
          commit_hash=$(jq -re '.data.createCommitOnBranch.commit.oid' <<<"$response") || {
            echo "createCommitOnBranch failed: $response" >&2
            exit 1
          }
          echo "commit-hash=$commit_hash" >> "$GITHUB_OUTPUT"
          echo "Created commit $commit_hash on main"

      - name: Sync checkout to release commit
        if: steps.commit-version-bump.outputs.commit-hash != ''
        env:
          COMMIT_HASH: ${{ steps.commit-version-bump.outputs.commit-hash }}
        run: |
          git fetch origin main
          git reset --hard "$COMMIT_HASH"

      # Publish before tagging so a failed publish does not leave a dangling tag.
      - name: Publish to Maven Central
        if: steps.commit-version-bump.outputs.commit-hash != ''
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./gradlew publishAllPublicationsToMavenCentralRepository \
            --no-daemon \
            --no-configuration-cache

      - name: Tag and push
        if: steps.commit-version-bump.outputs.commit-hash != ''
        env:
          NEW_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
          GH_APP_TOKEN: ${{ steps.releaser.outputs.token }}
        run: |
          git tag -a "$NEW_VERSION" -m "$NEW_VERSION"
          git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$NEW_VERSION"

      - name: Create GitHub Release
        if: steps.commit-version-bump.outputs.commit-hash != ''
        env:
          GH_TOKEN: ${{ steps.releaser.outputs.token }}
          NEW_VERSION: ${{ needs.prepare-release-candidate.outputs.new-version }}
          COMMIT_SHA: ${{ steps.commit-version-bump.outputs.commit-hash }}
        run: |
          # Extract the latest changelog entry (content between the first and second ## header)
          LAST_CHANGELOG_ENTRY=$(awk '/^## /{if (flag) exit; flag=1; next} flag' CHANGELOG.md | awk 'NF{f=1} f{l[++n]=$0; if(NF) last=n} END{for(i=1;i<=last;i++) print l[i]}')
          LAST_CHANGELOG_ENTRY=${LAST_CHANGELOG_ENTRY:-"see CHANGELOG.md"}
          gh release create "$NEW_VERSION" \
            --target "$COMMIT_SHA" \
            --title "$NEW_VERSION" \
            --notes "$LAST_CHANGELOG_ENTRY"

      - name: Notify Slack - Failed
        continue-on-error: true
        if: ${{ failure() && needs.notify-approval-needed.outputs.slack_ts != '' }}
        uses: PostHog/.github/.github/actions/slack-thread-reply@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "❌ Failed to release `posthog-kmp@${{ needs.prepare-release-candidate.outputs.new-version }}`! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          emoji_reaction: "x"

  # Runs on ubuntu because posthog-github-action is a container action, which
  # the macOS release job can't execute.
  report-failure:
    name: Send failure event to PostHog
    needs: [check-changesets, prepare-release-candidate, verify-release-candidate, release]
    runs-on: ubuntu-latest
    if: always() && (needs.prepare-release-candidate.result == 'failure' || needs.verify-release-candidate.result == 'failure' || needs.release.result == 'failure')
    steps:
      - name: Send failure event to PostHog
        continue-on-error: true
        uses: PostHog/posthog-github-action@9a6a19d360820ab4d95ecc4a5a7564062c895f84 # v1.3.0
        with:
          posthog-token: "${{ secrets.POSTHOG_PROJECT_API_KEY }}"
          event: "posthog-sdk-github-release-workflow-failure"
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "failure",
              "ref": "${{ github.ref }}",
              "repository": "${{ github.repository }}",
              "sdk": "posthog-kmp",
              "jobName": "${{ needs.release.result == 'failure' && 'release' || needs.verify-release-candidate.result == 'failure' && 'verify-release-candidate' || 'prepare-release-candidate' }}",
              "packageName": "posthog-kmp",
              "packageVersion": "${{ needs.prepare-release-candidate.outputs.new-version || 'unknown' }}",
              "actionUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "alertText": ":rotating_light: Failed to release posthog-kmp@${{ needs.prepare-release-candidate.outputs.new-version || 'unknown' }} :rotating_light:",
              "alertContext": "The release workflow failed before completion."
            }

  notify-rejected:
    name: Notify Slack - Rejected
    needs: [release, notify-approval-needed]
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'failure' && needs.notify-approval-needed.outputs.slack_ts != ''
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check for rejection
        id: check-rejection
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESPONSE=$(gh api /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/approvals)
          REJECTED=$(echo "$RESPONSE" | jq '[.[] | select(.state == "rejected")] | length')
          if [ "$REJECTED" -gt 0 ]; then
            echo "was_rejected=true" >> "$GITHUB_OUTPUT"
            COMMENT=$(echo "$RESPONSE" | jq -r '.[] | select(.state == "rejected") | .comment // empty' | head -1)
            if [ -n "$COMMENT" ]; then
              {
                echo 'message<<EOF'
                echo "🚫 Release was rejected: $COMMENT"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
            else
              echo "message=🚫 Release was rejected." >> "$GITHUB_OUTPUT"
            fi
          else
            echo "was_rejected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack - Rejected
        if: steps.check-rejection.outputs.was_rejected == 'true'
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "${{ steps.check-rejection.outputs.message }}"
          emoji_reaction: "no_entry_sign"

  notify-released:
    name: Notify Slack - Released
    needs: [check-changesets, notify-approval-needed, release]
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success' && needs.notify-approval-needed.outputs.slack_ts != ''
    steps:
      - name: Notify Slack - Released
        uses: PostHog/.github/.github/actions/slack-thread-reply@cb0979b67dcd585828b61ac45927eef4da8f6287 # main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "🚀 posthog-kmp released successfully!"
          emoji_reaction: "rocket"
