name: Lint PR

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-pr:
    name: Validate PR title against Conventional Commits
    permissions:
      contents: read
      pull-requests: read
    uses: PostHog/.github/.github/workflows/semantic-pr-title.yml@926dd076f0c796f7531177ae5cfcf1cf7cf0aeb3

  # feat/fix PRs ship user-visible changes, so they must carry a change intent;
  # other types (ci, docs, chore, ...) are exempt. Any intent present is
  # validated so malformed ones fail here instead of at release time.
  changeset:
    # Job name is a required status check in the branch ruleset; do not rename.
    name: Check for changeset
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect change intents
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if git diff --name-only "origin/${BASE_REF}...HEAD" -- '.changeset/*.md' | grep -v '^.changeset/README.md$' | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require change intent for feat/fix PRs
        if: steps.detect.outputs.present == 'false' && (startsWith(github.event.pull_request.title, 'feat') || startsWith(github.event.pull_request.title, 'fix'))
        run: |
          echo "::error::This feat/fix PR has no change intent. Run 'pnpm change' and commit the generated file (see RELEASING.md), or retitle the PR (e.g. chore:/ci:/docs:) if it should not be released."
          exit 1

      - name: Setup pnpm and Node.js
        if: steps.detect.outputs.present == 'true'
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0
        with:
          # Native release management requires pnpm >=11.13.0.
          version: 11.13.1
          runtime: node@24
          cache: true
          install: false

      - name: Validate change intents
        if: steps.detect.outputs.present == 'true'
        run: pnpm change status
